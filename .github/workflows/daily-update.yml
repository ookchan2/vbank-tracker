name: Daily VBank Tracker

on:
  schedule:
    # 香港時間早上 9:00 (UTC+8 → UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Persist the SQLite database between daily runs ──────────────────────
      # Without this, data/promotions.db is recreated blank every run:
      #   • Every promo gets created_at = today → all appear "new today"
      #   • No cross-run deduplication
      #   • "New today" in email ≠ genuinely new
      # Cache key is unique per run; restore-keys picks the most recent saved DB.
      - name: Restore promotions database
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/promotions.db
          key: promotions-db-${{ github.run_id }}
          restore-keys: |
            promotions-db-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run tracker bot
        env:
          POE_API_KEY:         ${{ secrets.POE_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          cd scripts
          python main.py

      # ── Commit docs/data.json ───────────────────────────────────────────────
      # Only docs/data.json is explicitly staged; DB, logs, and other artefacts
      # are intentionally ignored by this commit step.
      #
      # FIX: removed the old `git checkout -- .` that was reverting the file
      # before staging it, causing the commit to always be a no-op.
      #
      # FIX: `git pull --rebase --autostash` (was `--rebase origin main --rebase`,
      # duplicate flag).
      - name: Commit updated website data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "VBank Tracker Bot 🤖"
          git config user.email "bot@vbank-tracker.github.io"
          git add docs/data.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update data.json [$(date '+%Y-%m-%d %H:%M')]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main