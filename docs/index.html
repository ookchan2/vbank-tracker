<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK Virtual Bank Promotions Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .cat-tag { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px;
             color:#fff; font-weight:700; margin:2px 3px 2px 0; white-space:nowrap; }
  .bank-dot { display:inline-block; width:10px; height:10px; border-radius:50%;
              vertical-align:middle; margin-right:6px; }
  details > summary { list-style:none; cursor:pointer; }
  details > summary::-webkit-details-marker { display:none; }
  details[open] .chevron { transform: rotate(180deg); }
  .chevron { transition: transform 0.2s; display:inline-block; }
  tr:hover td { background:#f8fafc; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ── HEADER ─────────────────────────────────────────────────── -->
<div class="bg-gradient-to-r from-gray-900 to-gray-700 text-white px-4 py-6 shadow-lg">
  <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div>
      <h1 class="text-2xl font-extrabold tracking-tight">🏦 HK Virtual Bank Promotions</h1>
      <p class="text-gray-300 text-sm mt-1" id="lastUpdated">Loading…</p>
    </div>
    <div class="flex gap-3">
      <div class="bg-white/10 rounded-xl px-4 py-2 text-center">
        <div class="text-2xl font-black" id="statActive">–</div>
        <div class="text-xs text-gray-300 uppercase tracking-wide">Active</div>
      </div>
      <div class="bg-white/10 rounded-xl px-4 py-2 text-center">
        <div class="text-2xl font-black" id="statExpired">–</div>
        <div class="text-xs text-gray-300 uppercase tracking-wide">Expired</div>
      </div>
      <div class="bg-white/10 rounded-xl px-4 py-2 text-center">
        <div class="text-2xl font-black" id="statBanks">–</div>
        <div class="text-xs text-gray-300 uppercase tracking-wide">Banks</div>
      </div>
    </div>
  </div>
</div>

<!-- ── CONTROLS ───────────────────────────────────────────────── -->
<div class="max-w-7xl mx-auto px-4 py-4">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
    <div class="flex flex-col md:flex-row gap-3 items-start md:items-center flex-wrap">

      <!-- Search -->
      <div class="relative flex-1 min-w-48">
        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">🔍</span>
        <input id="searchInput" type="text" placeholder="Search promotions…"
          class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          oninput="applyFilters()">
      </div>

      <!-- Bank filter -->
      <select id="bankFilter" onchange="applyFilters()"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
        <option value="">All Banks</option>
      </select>

      <!-- Category filter -->
      <select id="catFilter" onchange="applyFilters()"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
        <option value="">All Categories</option>
        <option>迎新</option><option>消費</option><option>投資</option>
        <option>旅遊</option><option>保險</option><option>貸款</option>
        <option>存款</option><option>外匯</option><option>推薦</option>
        <option>長期獎勵</option><option>新資金</option><option>Others</option>
      </select>

      <!-- Status filter -->
      <select id="statusFilter" onchange="applyFilters()"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
        <option value="active">Active Only</option>
        <option value="expired">Expired Only</option>
        <option value="all">All (Active + Expired)</option>
      </select>

      <!-- Export -->
      <button onclick="exportExcel()"
        class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors">
        📥 Export Excel
      </button>

    </div>

    <!-- Result count -->
    <div class="mt-3 text-sm text-gray-500" id="resultCount"></div>
  </div>
</div>

<!-- ── PROMOTIONS TABLE ────────────────────────────────────────── -->
<div class="max-w-7xl mx-auto px-4 pb-10">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

    <!-- Loading state -->
    <div id="loadingState" class="p-16 text-center text-gray-400">
      <div class="text-4xl mb-3">⏳</div>
      <div class="text-lg font-medium">Loading promotions…</div>
    </div>

    <!-- Error state -->
    <div id="errorState" class="p-16 text-center text-red-400 hidden">
      <div class="text-4xl mb-3">⚠️</div>
      <div class="text-lg font-medium">Failed to load data</div>
      <div class="text-sm mt-2" id="errorMsg"></div>
    </div>

    <!-- Table -->
    <div id="tableWrapper" class="hidden overflow-x-auto">
      <table class="w-full border-collapse text-sm" id="promoTable">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="text-left px-4 py-3 font-700 text-gray-500 uppercase text-xs tracking-wide">Bank</th>
            <th class="text-left px-4 py-3 font-700 text-gray-500 uppercase text-xs tracking-wide">Promotion</th>
            <th class="text-left px-4 py-3 font-700 text-gray-500 uppercase text-xs tracking-wide">Category</th>
            <th class="text-left px-4 py-3 font-700 text-gray-500 uppercase text-xs tracking-wide whitespace-nowrap">Period</th>
            <th class="text-left px-4 py-3 font-700 text-gray-500 uppercase text-xs tracking-wide">Status</th>
            <th class="text-left px-4 py-3 font-700 text-gray-500 uppercase text-xs tracking-wide">Details</th>
          </tr>
        </thead>
        <tbody id="promoTbody"></tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="p-16 text-center text-gray-400 hidden">
      <div class="text-4xl mb-3">🔍</div>
      <div class="text-lg font-medium">No promotions match your filters</div>
    </div>

  </div>
</div>

<script>
// ── Category config ──────────────────────────────────────────────
const CAT_META = {
  "迎新":     {bg:"#10b981", emoji:"🎉"},
  "消費":     {bg:"#f59e0b", emoji:"💳"},
  "投資":     {bg:"#6366f1", emoji:"📈"},
  "旅遊":     {bg:"#06b6d4", emoji:"✈️"},
  "保險":     {bg:"#ef4444", emoji:"🛡️"},
  "貸款":     {bg:"#dc2626", emoji:"💰"},
  "存款":     {bg:"#3b82f6", emoji:"🏦"},
  "外匯":     {bg:"#8b5cf6", emoji:"🌐"},
  "推薦":     {bg:"#ec4899", emoji:"👥"},
  "長期獎勵": {bg:"#f97316", emoji:"⭐"},
  "新資金":   {bg:"#0ea5e9", emoji:"💵"},
  "Others":   {bg:"#6b7280", emoji:"📋"},
};

const BANK_COLORS = {
  "ZA Bank":     "#25CD9C",
  "Mox Bank":    "#ec4899",
  "WeLab Bank":  "#7c3aed",
  "livi bank":   "#f97316",
  "PAObank":     "#0ea5e9",
  "Airstar Bank":"#06b6d4",
  "Fusion Bank": "#14b8a6",
  "Ant Bank":    "#1677ff",
};

function bankColor(name) {
  for (const [k, v] of Object.entries(BANK_COLORS)) {
    if (name && name.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return "#6b7280";
}

function catMeta(cat) {
  return CAT_META[cat] || {bg:"#6b7280", emoji:"📋"};
}

function catTag(cat) {
  const m = catMeta(cat);
  return `<span class="cat-tag" style="background:${m.bg}">${m.emoji} ${cat}</span>`;
}

// ── State ────────────────────────────────────────────────────────
let allPromos = [];
let filtered  = [];

// ── Load data ────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('./data.json?_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allPromos = data.promotions || [];

    // Stats
    const activeN  = allPromos.filter(p => p.active).length;
    const expiredN = allPromos.filter(p => !p.active).length;
    const banks    = new Set(allPromos.map(p => p.bank_name)).size;

    document.getElementById('statActive').textContent  = activeN;
    document.getElementById('statExpired').textContent = expiredN;
    document.getElementById('statBanks').textContent   = banks;
    document.getElementById('lastUpdated').textContent =
      `Last updated: ${data.updated || 'Unknown'} HKT`;

    // Populate bank filter
    const bankSel = document.getElementById('bankFilter');
    [...new Set(allPromos.map(p => p.bank_name))].sort().forEach(b => {
      const opt = document.createElement('option');
      opt.value = b; opt.textContent = b;
      bankSel.appendChild(opt);
    });

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('tableWrapper').classList.remove('hidden');
    applyFilters();

  } catch (e) {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
    document.getElementById('errorMsg').textContent = e.message;
  }
}

// ── Filter ───────────────────────────────────────────────────────
function applyFilters() {
  const search  = document.getElementById('searchInput').value.toLowerCase();
  const bank    = document.getElementById('bankFilter').value;
  const cat     = document.getElementById('catFilter').value;
  const status  = document.getElementById('statusFilter').value;

  filtered = allPromos.filter(p => {
    // Status
    if (status === 'active'  && !p.active) return false;
    if (status === 'expired' &&  p.active) return false;
    // Bank
    if (bank && p.bank_name !== bank) return false;
    // Category
    if (cat && !(p.types || []).includes(cat)) return false;
    // Search
    if (search) {
      const haystack = [
        p.bank_name, p.title, p.highlight, p.description, p.period,
        ...(p.types || [])
      ].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  renderTable(filtered);
  document.getElementById('resultCount').textContent =
    `Showing ${filtered.length} of ${allPromos.length} promotions`;
}

// ── Render ───────────────────────────────────────────────────────
function renderTable(promos) {
  const tbody = document.getElementById('promoTbody');
  const empty = document.getElementById('emptyState');
  const wrap  = document.getElementById('tableWrapper');

  if (promos.length === 0) {
    tbody.innerHTML = '';
    wrap.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  wrap.classList.remove('hidden');

  tbody.innerHTML = promos.map((p, i) => {
    const color   = bankColor(p.bank_name);
    const cats    = (p.types || ['Others']).map(catTag).join('');
    const statusBadge = p.active
      ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-700">● Active</span>`
      : `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold bg-gray-100 text-gray-500">● Expired</span>`;
    const tcLink = p.tc_link || p.url || '#';

    // Expanded detail row
    const detailId = `detail-${i}`;
    const detailHtml = `
      <tr id="${detailId}" class="hidden bg-indigo-50/40">
        <td colspan="6" class="px-6 py-4">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
            <div>
              <div class="font-bold text-gray-500 uppercase text-xs mb-1">📅 Period</div>
              <div class="text-gray-700">${p.period || '—'}</div>
            </div>
            <div>
              <div class="font-bold text-gray-500 uppercase text-xs mb-1">👥 Quota / Eligibility</div>
              <div class="text-gray-700">${p.quota || '—'}</div>
            </div>
            <div>
              <div class="font-bold text-gray-500 uppercase text-xs mb-1">💲 Cost / Min Spend</div>
              <div class="text-gray-700">${p.cost || '—'}</div>
            </div>
            <div class="md:col-span-3">
              <div class="font-bold text-gray-500 uppercase text-xs mb-1">📝 Summary</div>
              <div class="text-gray-700 leading-relaxed">${p.description || p.highlight || '—'}</div>
            </div>
            <div class="md:col-span-3">
              <a href="${tcLink}" target="_blank" rel="noopener"
                 class="inline-flex items-center gap-1 text-indigo-600 hover:text-indigo-800 text-xs font-semibold underline">
                📄 View T&amp;C / Official Source ↗
              </a>
            </div>
          </div>
        </td>
      </tr>`;

    const mainRow = `
      <tr class="border-b border-gray-50 cursor-pointer" onclick="toggleDetail(${i})">
        <td class="px-4 py-3 whitespace-nowrap">
          <span class="bank-dot" style="background:${color}"></span>
          <span class="font-semibold text-gray-700">${p.bank_name}</span>
        </td>
        <td class="px-4 py-3 max-w-xs">
          <div class="font-semibold text-gray-800 leading-snug">${p.title}</div>
          <div class="text-gray-500 text-xs mt-0.5 line-clamp-1">${p.highlight || ''}</div>
        </td>
        <td class="px-4 py-3">${cats}</td>
        <td class="px-4 py-3 whitespace-nowrap text-gray-500 text-xs">${p.period || '—'}</td>
        <td class="px-4 py-3">${statusBadge}</td>
        <td class="px-4 py-3 text-gray-400 text-xs">
          <span class="chevron" id="chevron-${i}">▼</span>
        </td>
      </tr>
      ${detailHtml}`;

    return mainRow;
  }).join('');
}

function toggleDetail(i) {
  const row  = document.getElementById(`detail-${i}`);
  const chev = document.getElementById(`chevron-${i}`);
  const open = !row.classList.contains('hidden');
  row.classList.toggle('hidden', open);
  chev.style.transform = open ? '' : 'rotate(180deg)';
}

// ── Excel Export ─────────────────────────────────────────────────
function exportExcel() {
  if (!filtered.length) { alert('No promotions to export.'); return; }

  const rows = filtered.map(p => ({
    'Bank':        p.bank_name,
    'Title':       p.title,
    'Categories':  (p.types || []).join(', '),
    'Period':      p.period || '',
    'End Date':    p.end_date || '',
    'Status':      p.active ? 'Active' : 'Expired',
    'Quota':       p.quota || '',
    'Cost':        p.cost || '',
    'Highlight':   p.highlight || '',
    'Description': p.description || '',
    'T&C Link':    p.tc_link || p.url || '',
    'Last Seen':   p.last_seen || '',
  }));

  const ws = XLSX.utils.json_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:15},{wch:50},{wch:25},{wch:25},{wch:12},{wch:10},
    {wch:30},{wch:20},{wch:40},{wch:60},{wch:40},{wch:20}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Promotions');

  const date = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, `HK_VBank_Promotions_${date}.xlsx`);
}

// ── Boot ─────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
